name: CI

on:
  push:
    branches: [main, master, feat/*]
  pull_request:
    branches: [main, master]

jobs:
  go-backend:
    name: Go Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cmdb-core

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: cmdb-core/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Tenantlint (baseline-gated)
        run: ./scripts/tenantlint-check.sh

      # D7-P1 (review-2026-04-21-v2): fail CI on known vulnerabilities in
      # the Go module graph. govulncheck loads the Go vulnerability DB and
      # reports only vulns the project actually calls into, so false
      # positive rate stays low. Installed inline rather than cached to
      # keep the tool version pinned to what's vetted for this repo.
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        run: govulncheck ./...

      - name: Test
        run: go test ./... -race -count=1 -timeout=60s

  prometheus-rules:
    name: Prometheus Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Validate every SLO recording rule + burn-rate alert with promtool.
      # Catches malformed PromQL that yaml.safe_load wouldn't see — the
      # SLO definitions ship in cmdb-core/deploy/prometheus/rules/.
      - name: Install promtool
        run: |
          PROM_VERSION=2.55.1
          curl -sLO "https://github.com/prometheus/prometheus/releases/download/v${PROM_VERSION}/prometheus-${PROM_VERSION}.linux-amd64.tar.gz"
          tar xzf "prometheus-${PROM_VERSION}.linux-amd64.tar.gz"
          sudo mv "prometheus-${PROM_VERSION}.linux-amd64/promtool" /usr/local/bin/
          promtool --version

      - name: Validate SLO rules
        run: promtool check rules cmdb-core/deploy/prometheus/rules/*.yml

  go-integration-tests:
    name: Go Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cmdb-core

    # Real Postgres covers the //go:build integration suites — tenant
    # isolation regressions, sync agent, RBAC, workflows event chains.
    # Without this job those tests sit in the repo as documentation only.
    services:
      # Match the deploy/docker-compose.yml image so CI reflects what
      # production runs. Migration 000009 was widened to start_offset=3h
      # to satisfy the strict refresh-window check on TimescaleDB 2.20+.
      postgres:
        image: timescale/timescaledb:latest-pg17
        env:
          POSTGRES_USER: cmdb
          POSTGRES_PASSWORD: cmdb
          POSTGRES_DB: cmdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: cmdb-core/go.sum

      - name: Install golang-migrate
        run: |
          curl -sL https://github.com/golang-migrate/migrate/releases/download/v4.18.1/migrate.linux-amd64.tar.gz | tar xz
          sudo mv migrate /usr/local/bin/

      # Migration 000012 seeds rows that FK to the primary tenant
      # ('a0000000-...-001'). That tenant is created by db/seed/seed.sql,
      # which is normally run after migrations. Split the apply into two
      # phases so the seed tenant exists before the FK references it.
      - name: Apply migrations + seed primary tenant
        env:
          DATABASE_URL: postgres://cmdb:cmdb@localhost:5432/cmdb?sslmode=disable
          PGPASSWORD: cmdb
        run: |
          # Phase 1: schema up to and including the tenants table.
          migrate -path db/migrations -database "$DATABASE_URL" up 2
          # Pre-seed the primary tenant referenced by later migrations.
          psql -h localhost -U cmdb -d cmdb -c "INSERT INTO tenants (id, name, slug) VALUES ('a0000000-0000-0000-0000-000000000001', 'Primary Tenant', 'tw') ON CONFLICT (slug) DO NOTHING;"
          # Phase 2: the rest.
          migrate -path db/migrations -database "$DATABASE_URL" up

      # Note: integration tests create their own fixtures inline via test
      # helpers (see e.g. auth_service_tenant_isolation_test.go, tenant_
      # isolation_integration_test.go). They do NOT need seed.sql or
      # test-fixture.sql loaded here — loading them would conflict with
      # the unique tenant / asset IDs each test helper creates fresh.
      # test-fixture.sql exists for UI development; see db/seed/README.md.

      - name: Integration tests
        env:
          TEST_DATABASE_URL: postgres://cmdb:cmdb@localhost:5432/cmdb?sslmode=disable
          DATABASE_URL: postgres://cmdb:cmdb@localhost:5432/cmdb?sslmode=disable
        run: go test -tags integration -race -count=1 -timeout=300s ./...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cmdb-demo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: cmdb-demo/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # D7-P1 (review-2026-04-21-v2): npm audit on runtime deps only.
      # --omit=dev keeps the signal focused on what actually ships; dev
      # tools with transitive vulns don't reach users.
      - name: npm audit (runtime deps)
        run: npm audit --audit-level=high --omit=dev

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test (with coverage)
        run: npm run test:coverage

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: cmdb-demo/coverage/
          if-no-files-found: warn

      - name: Build
        run: npm run build

  python-ingestion:
    name: Python Ingestion Engine
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ingestion-engine

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # W11: lockfile freshness gate. requirements.txt and requirements-dev.txt
      # are pip-compile'd from pyproject.toml with --generate-hashes; if a
      # contributor edits pyproject.toml without re-running pip-compile, the
      # diff below is non-empty and CI fails before any test runs.
      - name: Install pip-tools
        run: pip install pip-tools

      - name: Verify lockfile freshness
        run: |
          pip-compile --quiet --no-header --strip-extras --generate-hashes --output-file=/tmp/requirements.txt pyproject.toml
          pip-compile --quiet --no-header --strip-extras --extra=dev --generate-hashes --output-file=/tmp/requirements-dev.txt pyproject.toml
          diff -u requirements.txt /tmp/requirements.txt
          diff -u requirements-dev.txt /tmp/requirements-dev.txt

      - name: Install dependencies (from lockfile)
        run: |
          pip install --require-hashes -r requirements-dev.txt
          pip install -e . --no-deps

      - name: Test (with coverage)
        run: pytest tests/ -v --tb=short --cov --cov-report=term --cov-report=xml --cov-report=html

      - name: Upload ingestion coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ingestion-coverage
          path: |
            ingestion-engine/htmlcov/
            ingestion-engine/coverage.xml
          if-no-files-found: warn

  e2e-tests:
    # E2E suite runs against fully-stubbed APIs (no real backend needed) —
    # the original `if: false` comment about Docker Compose was outdated.
    # Re-enabled 2026-04-28 with continue-on-error: true so runs become
    # visible in CI without gating PRs while the 13 stale specs that broke
    # during Waves F-M are repaired in follow-up.
    name: E2E Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: cmdb-demo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cmdb-demo/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx playwright install chromium --with-deps
      # Smoke + responsive subsets are known-green; the rest may report
      # failures while the helpers/specs catch up to the post-Wave-G UI.
      - run: npx playwright test --project=chromium
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: cmdb-demo/playwright-report/
          if-no-files-found: warn
