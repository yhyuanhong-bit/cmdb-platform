  # ── Sync (edge/replica synchronization) ───────────────────────────────────
  /sync/changes:
    get:
      operationId: syncGetChanges
      tags: [integration]
      summary: Incremental changes for a given entity type since a version
      parameters:
        - name: entity_type
          in: query
          required: true
          schema:
            type: string
            enum: [assets, locations, racks, work_orders, alert_events, inventory_tasks, alert_rules, inventory_items, audit_events]
        - name: since_version
          in: query
          schema:
            type: integer
            format: int64
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
      responses:
        '200':
          description: Change set
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/SyncChangeSet' }
                  meta: { $ref: '#/components/schemas/Meta' }
        '400':
          $ref: '#/components/responses/BadRequest'

  /sync/state:
    get:
      operationId: syncGetState
      tags: [integration]
      summary: Sync state for all replicas/entity-types
      responses:
        '200':
          description: Sync state
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/SyncStateRow' }
                  meta: { $ref: '#/components/schemas/Meta' }

  /sync/conflicts:
    get:
      operationId: syncGetConflicts
      tags: [integration]
      summary: Pending sync conflicts
      responses:
