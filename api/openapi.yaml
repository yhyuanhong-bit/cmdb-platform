          type: string
        row_label:
          type: string
        total_u:
          type: integer
        used_u:
          type: integer
        power_capacity_kw:
          type: number
        power_current_kw:
          type: number
        status:
          type: string
        tags:
          type: array
          items:
            type: string
          default: []
        created_at:
          type: string
          format: date-time
      required:
        - id
        - location_id
        - name
        - row_label
        - total_u
        - used_u
        - power_capacity_kw
        - power_current_kw
        - status
        - tags
        - created_at

    # ── WorkOrder ─────────────────────────────────────────────────────────
    WorkOrder:
      type: object
