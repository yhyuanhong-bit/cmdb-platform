            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BIADependency'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: createBIADependency
      tags: [bia]
      summary: Add a dependency to a BIA assessment
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [asset_id, dependency_type]
              properties:
                asset_id:
                  type: string
                  format: uuid
                dependency_type:
                  type: string
                criticality:
                  type: string
      responses:
        '201':
          description: Dependency created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/BIADependency'
