        - name
        - description
        - permissions
        - is_system

    # ── PredictionModel ───────────────────────────────────────────────────
    PredictionModel:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
        provider:
          type: string
        config:
          type: object
          additionalProperties: true
        enabled:
          type: boolean
      required:
        - id
        - name
        - type
        - provider
        - config
        - enabled

    # ── RCAAnalysis ───────────────────────────────────────────────────────
    RCAAnalysis:
      type: object
      properties:
