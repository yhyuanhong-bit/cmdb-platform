                type: object
                properties:
                  data: { $ref: '#/components/schemas/CapacityPlanning' }
                  meta: { $ref: '#/components/schemas/Meta' }

  /fleet-metrics:
    get:
      operationId: getFleetMetricsSummary
      tags: [dashboard]
      summary: Fleet-wide aggregate metrics (CPU, memory, health distribution)
      responses:
        '200':
          description: Fleet metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/FleetMetrics' }
