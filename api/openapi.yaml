              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/SyncConflict' }
                  meta: { $ref: '#/components/schemas/Meta' }

  /sync/conflicts/{id}/resolve:
    post:
      operationId: syncResolveConflict
      tags: [integration]
      summary: Resolve a sync conflict
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SyncResolveRequest' }
      responses:
        '204':
          description: Conflict resolved
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /sync/snapshot:
    get:
      operationId: syncSnapshot
      tags: [integration]
      summary: Full NDJSON snapshot of an entity type for initial sync
      parameters:
        - name: entity_type
          in: query
          required: true
          schema:
            type: string
            enum: [assets, locations, racks, work_orders, alert_events, inventory_tasks, alert_rules, inventory_items, audit_events]
      responses:
        '200':
          description: NDJSON stream (one JSON object per line)
          content:
            application/x-ndjson:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'

  /sync/stats:
    get:
      operationId: syncStats
      tags: [integration]
      summary: Per-entity max versions and per-node sync gaps
      responses:
        '200':
          description: Stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/SyncEntityStats' }
                  meta: { $ref: '#/components/schemas/Meta' }

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    # ── Response wrappers ─────────────────────────────────────────────────
    Meta:
      type: object
      properties:
        request_id:
          type: string
      required: [request_id]

    Pagination:
      type: object
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
      required: [page, page_size, total, total_pages]

    ErrorBody:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required: [code, message]

    ErrorResponse:
      type: object
      properties:
        error:
          $ref: '#/components/schemas/ErrorBody'
        meta:
          $ref: '#/components/schemas/Meta'
      required: [error, meta]

    # ── Auth ──────────────────────────────────────────────────────────────
    TokenPair:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
      required: [access_token, refresh_token, expires_in]

    CurrentUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        display_name:
          type: string
        email:
          type: string
        permissions:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
      required: [id, username, display_name, email, permissions]

    LoginRequest:
      type: object
      description: |
        TenantSlug was added in Phase 1.3 of the remediation roadmap to
        disambiguate cross-tenant duplicate usernames. It is optional for
        backwards compatibility; the server logs a deprecation warning when it
        is omitted and the caller relies on the legacy global-username lookup.
      properties:
        username:
          type: string
        password:
          type: string
        tenant_slug:
          type: string
      required: [username, password]

    RefreshRequest:
      type: object
      properties:
        refresh_token:
          type: string
      required: [refresh_token]

    # ── Asset ─────────────────────────────────────────────────────────────
    Asset:
      type: object
      properties:
        id:
          type: string
          format: uuid
        asset_tag:
          type: string
        property_number:
          type: string
          nullable: true
        control_number:
          type: string
          nullable: true
        name:
          type: string
        type:
          type: string
        sub_type:
          type: string
        status:
          type: string
        bia_level:
          type: string
        location_id:
          type: string
          nullable: true
          format: uuid
        rack_id:
          type: string
          nullable: true
          format: uuid
        vendor:
          type: string
        model:
          type: string
        serial_number:
          type: string
        attributes:
          type: object
          additionalProperties: true
        tags:
          type: array
          items:
            type: string
          default: []
        bmc_ip:
          type: string
          nullable: true
        bmc_type:
          type: string
          nullable: true
        bmc_firmware:
          type: string
          nullable: true
        purchase_date:
          type: string
          nullable: true
          description: ISO-8601 date (YYYY-MM-DD)
        purchase_cost:
          type: number
          format: double
          nullable: true
        warranty_start:
          type: string
          nullable: true
          description: ISO-8601 date (YYYY-MM-DD)
        warranty_end:
          type: string
          nullable: true
          description: ISO-8601 date (YYYY-MM-DD)
        warranty_vendor:
          type: string
          nullable: true
        warranty_contract:
          type: string
          nullable: true
        eol_date:
          type: string
          nullable: true
          description: ISO-8601 date (YYYY-MM-DD)
        expected_lifespan_months:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - asset_tag
        - name
        - type
        - sub_type
        - status
        - bia_level
        - vendor
        - model
        - serial_number
        - attributes
        - tags
        - created_at
        - updated_at

    # ── Location ──────────────────────────────────────────────────────────
    Location:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        name_en:
          type: string
        slug:
          type: string
        level:
          type: string
        parent_id:
          type: string
          nullable: true
          format: uuid
        path:
          type: string
        status:
          type: string
        metadata:
          type: object
          additionalProperties: true
        sort_order:
          type: integer
        latitude:
          type: number
          format: double
          nullable: true
        longitude:
          type: number
          format: double
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - name_en
        - slug
        - level
        - path
        - status
        - metadata
        - sort_order
        - created_at
        - updated_at

    # ── Rack ──────────────────────────────────────────────────────────────
    Rack:
      type: object
