        - confidence
        - human_verified

    # ── WorkOrderLog ──────────────────────────────────────────────────────
    WorkOrderLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        order_id:
          type: string
          format: uuid
        action:
          type: string
        from_status:
          type: string
          nullable: true
        to_status:
          type: string
          nullable: true
        operator_id:
          type: string
          nullable: true
