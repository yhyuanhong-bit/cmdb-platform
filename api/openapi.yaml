    # ── LocationStats ─────────────────────────────────────────────────────
    LocationStats:
      type: object
      properties:
        total_assets:
          type: integer
        total_racks:
          type: integer
        critical_alerts:
          type: integer
        avg_occupancy:
          type: number
      required:
        - total_assets
        - total_racks
        - critical_alerts
        - avg_occupancy

    # ── DashboardStats ────────────────────────────────────────────────────
    DashboardStats:
      type: object
      properties:
        total_assets:
          type: integer
        total_racks:
          type: integer
        critical_alerts:
          type: integer
        active_orders:
          type: integer
        pending_work_orders:
          type: integer
          description: Count of work orders in submitted or approved state.
        energy_current_kw:
          type: number
          format: double
          description: Latest sum of power.current_w across assets (kW). Zero on timeout.
        rack_utilization_pct:
          type: number
          format: double
          description: Rack slot occupancy over total rack U capacity, as a percentage (0-100).
        avg_quality_score:
          type: number
          format: double
          description: Mean of each asset's most recent total_score in quality_scores (0-100).
      required:
        - total_assets
        - total_racks
        - critical_alerts
        - active_orders
        - pending_work_orders
        - energy_current_kw
        - rack_utilization_pct
        - avg_quality_score

