        - action
        - module
        - target_type
        - target_id
        - operator_id
        - diff
        - created_at

    # ── User ──────────────────────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        display_name:
          type: string
        email:
          type: string
        phone:
          type: string
        status:
          type: string
        source:
          type: string
        created_at:
          type: string
          format: date-time
      required:
