        - username
        - display_name
        - email
        - phone
        - status
        - source
        - created_at

    # ── Role ──────────────────────────────────────────────────────────────
    Role:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        permissions:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        is_system:
          type: boolean
      required:
