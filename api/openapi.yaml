openapi: "3.0.3"
info:
  title: CMDB Platform API
  version: "1.0.0"
  description: Configuration Management Database Platform API
servers:
  - url: /api/v1
security:
  - BearerAuth: []

tags:
  - name: auth
    description: Authentication
  - name: topology
    description: Locations, racks, and physical topology
  - name: assets
    description: Asset management
  - name: maintenance
    description: Work orders and maintenance
  - name: monitoring
    description: Alerts and monitoring
  - name: inventory
    description: Inventory tasks
  - name: audit
    description: Audit trail
  - name: dashboard
    description: Dashboard statistics
  - name: identity
    description: Users and roles
  - name: prediction
    description: AI predictions and RCA
  - name: system
    description: System health and diagnostics
  - name: integration
    description: Integration adapters and webhooks

paths:
  # ── Auth ────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      security: []
      summary: Authenticate and obtain tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/TokenPair'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      security: []
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/TokenPair'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current authenticated user
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CurrentUser'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── Topology ────────────────────────────────────────────────────────────
  /locations:
    get:
      operationId: listLocations
      tags: [topology]
      summary: List locations
      parameters:
        - name: slug
          in: query
          schema:
            type: string
        - name: level
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Location list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Location'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createLocation
      tags: [topology]
      summary: Create a new location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug, level, status]
              properties:
                name:
                  type: string
                name_en:
                  type: string
                slug:
                  type: string
                level:
                  type: string
                parent_id:
                  type: string
                  format: uuid
                  nullable: true
                status:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
                sort_order:
                  type: integer
      responses:
        '201':
          description: Location created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Location'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /locations/{id}:
    get:
      operationId: getLocation
      tags: [topology]
      summary: Get a location by ID
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Location detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Location'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateLocation
      tags: [topology]
      summary: Update a location
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                name_en:
                  type: string
                slug:
                  type: string
                level:
                  type: string
                status:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
                sort_order:
                  type: integer
      responses:
        '200':
          description: Location updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Location'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteLocation
      tags: [topology]
      summary: Delete a location
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Location deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /locations/{id}/children:
    get:
      operationId: listLocationChildren
      tags: [topology]
      summary: List child locations
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Child locations
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Location'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /locations/{id}/ancestors:
    get:
      operationId: listLocationAncestors
      tags: [topology]
      summary: List ancestor locations
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Ancestor locations
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Location'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /locations/{id}/stats:
    get:
      operationId: getLocationStats
      tags: [topology]
      summary: Get location statistics
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Location stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/LocationStats'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /locations/{id}/descendants:
    get:
      operationId: listLocationDescendants
      tags: [topology]
      summary: List all descendant locations
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Descendant locations
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Location'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /locations/{id}/racks:
    get:
      operationId: listLocationRacks
      tags: [topology]
      summary: List racks in a location
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Rack list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Rack'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /racks:
    post:
      operationId: createRack
      tags: [topology]
      summary: Create a new rack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [location_id, name, status]
              properties:
                location_id:
                  type: string
                  format: uuid
                name:
                  type: string
                row_label:
                  type: string
                total_u:
                  type: integer
                power_capacity_kw:
                  type: number
                status:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Rack created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Rack'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /racks/{id}:
    get:
      operationId: getRack
      tags: [topology]
      summary: Get a rack by ID
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Rack detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Rack'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateRack
      tags: [topology]
      summary: Update a rack
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                row_label:
                  type: string
                total_u:
                  type: integer
                power_capacity_kw:
                  type: number
                status:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Rack updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Rack'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteRack
      tags: [topology]
      summary: Delete a rack
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Rack deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /racks/{id}/assets:
    get:
      operationId: listRackAssets
      tags: [topology]
      summary: List assets in a rack
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Asset list for rack
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Asset'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Assets ──────────────────────────────────────────────────────────────
  /assets:
    get:
      operationId: listAssets
      tags: [assets]
      summary: List assets with pagination and filters
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: type
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: location_id
          in: query
          schema:
            type: string
            format: uuid
        - name: rack_id
          in: query
          schema:
            type: string
            format: uuid
        - name: serial_number
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated asset list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Asset'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createAsset
      tags: [assets]
      summary: Create a new asset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Asset'
      responses:
        '201':
          description: Asset created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Asset'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /assets/{id}:
    get:
      operationId: getAsset
      tags: [assets]
      summary: Get an asset by ID
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Asset detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Asset'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateAsset
      tags: [assets]
      summary: Update an asset
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                status:
                  type: string
                bia_level:
                  type: string
                location_id:
                  type: string
                  format: uuid
                  nullable: true
                rack_id:
                  type: string
                  format: uuid
                  nullable: true
                vendor:
                  type: string
                model:
                  type: string
                attributes:
                  type: object
                  additionalProperties: true
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Asset updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Asset'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteAsset
      tags: [assets]
      summary: Delete an asset
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Asset deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Maintenance ─────────────────────────────────────────────────────────
  /maintenance/orders:
    get:
      operationId: listWorkOrders
      tags: [maintenance]
      summary: List work orders
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            type: string
        - name: asset_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated work order list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkOrder'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createWorkOrder
      tags: [maintenance]
      summary: Create a new work order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, type]
              properties:
                title:
                  type: string
                type:
                  type: string
                priority:
                  type: string
                location_id:
                  type: string
                  format: uuid
                assignee_id:
                  type: string
                  format: uuid
                description:
                  type: string
                scheduled_start:
                  type: string
                  format: date-time
                scheduled_end:
                  type: string
                  format: date-time
      responses:
        '201':
          description: Work order created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/WorkOrder'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /maintenance/orders/{id}:
    get:
      operationId: getWorkOrder
      tags: [maintenance]
      summary: Get a work order by ID
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Work order detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/WorkOrder'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateWorkOrder
      tags: [maintenance]
      summary: Update a work order
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                priority:
                  type: string
                assignee_id:
                  type: string
                  format: uuid
                scheduled_start:
                  type: string
                  format: date-time
                scheduled_end:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Work order updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/WorkOrder'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /maintenance/orders/{id}/logs:
    get:
      operationId: listWorkOrderLogs
      tags: [maintenance]
      summary: List work order logs
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Work order logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkOrderLog'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '404':
          $ref: '#/components/responses/NotFound'

  /maintenance/orders/{id}/transition:
    post:
      operationId: transitionWorkOrder
      tags: [maintenance]
      summary: Transition work order status
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                comment:
                  type: string
      responses:
        '200':
          description: Work order transitioned
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/WorkOrder'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Monitoring ──────────────────────────────────────────────────────────
  /monitoring/alerts:
    get:
      operationId: listAlerts
      tags: [monitoring]
      summary: List alert events
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            type: string
        - name: severity
          in: query
          schema:
            type: string
        - name: asset_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Alert list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AlertEvent'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /monitoring/alerts/{id}/ack:
    post:
      operationId: acknowledgeAlert
      tags: [monitoring]
      summary: Acknowledge an alert
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Alert acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /monitoring/alerts/{id}/resolve:
    post:
      operationId: resolveAlert
      tags: [monitoring]
      summary: Resolve an alert
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Alert resolved
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /monitoring/rules:
    get:
      operationId: listAlertRules
      tags: [monitoring]
      summary: List alert rules
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated alert rules list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AlertRule'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createAlertRule
      tags: [monitoring]
      summary: Create an alert rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, metric_name, condition, severity]
              properties:
                name:
                  type: string
                metric_name:
                  type: string
                condition:
                  type: object
                  additionalProperties: true
