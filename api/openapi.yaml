    QRAssetPayload:
      type: object
      properties:
        t: { type: string, enum: [asset] }
        id: { type: string, format: uuid }
        tag: { type: string }
        sn: { type: string }
        name: { type: string }
      required: [t, id, tag, name]

    QRRackPayload:
      type: object
      properties:
        t: { type: string, enum: [rack] }
        id: { type: string, format: uuid }
        name: { type: string }
        loc: { type: string }
      required: [t, id, name]

    ConfirmLocationRequest:
      type: object
      properties:
        rack_id: { type: string, format: uuid }
      required: [rack_id]

    LocationAssetCount:
      type: object
      properties:
        location_id: { type: string, format: uuid }
        location_name: { type: string }
        asset_count: { type: integer }
      required: [location_id, asset_count]

    # ── Upgrade rules ──────────────────────────────────────────────────────
    UpgradeRule:
      type: object
      properties:
        id: { type: string, format: uuid }
        asset_type: { type: string }
        category: { type: string }
        metric_name: { type: string }
        threshold: { type: number, format: double }
        duration_days: { type: integer }
        priority: { type: string, enum: [low, medium, high] }
        recommendation: { type: string }
        enabled: { type: boolean }
      required: [id, asset_type, category, priority, enabled]

    CreateUpgradeRuleRequest:
      type: object
      properties:
        asset_type: { type: string }
        category: { type: string }
        metric_name: { type: string }
        threshold: { type: number, format: double }
        duration_days: { type: integer, default: 7 }
        priority: { type: string, enum: [low, medium, high], default: medium }
        recommendation: { type: string }
        enabled: { type: boolean, default: true }
      required: [asset_type, category]

    UpdateUpgradeRuleRequest:
      type: object
      properties:
        threshold: { type: number, format: double }
        duration_days: { type: integer }
        priority: { type: string, enum: [low, medium, high] }
        recommendation: { type: string }
        enabled: { type: boolean }

    # ── Inventory scan ─────────────────────────────────────────────────────
    ItemScanRecord:
      type: object
      properties:
        id: { type: string, format: uuid }
        item_id: { type: string, format: uuid }
        scanned_by: { type: string, format: uuid }
        scanned_at: { type: string, format: date-time }
        location_rack_id: { type: string, format: uuid, nullable: true }
        note: { type: string, nullable: true }
      additionalProperties: true

    ItemScanRequest:
      type: object
      properties:
        rack_id: { type: string, format: uuid, nullable: true }
        note: { type: string }

    # ── Maintenance order comment ──────────────────────────────────────────
    WorkOrderComment:
      type: object
      properties:
        id: { type: string, format: uuid }
        work_order_id: { type: string, format: uuid }
        author_id: { type: string, format: uuid }
        author_name: { type: string, nullable: true }
        body: { type: string }
        created_at: { type: string, format: date-time }
      required: [id, work_order_id, body, created_at]

    # ── Identity / notifications ───────────────────────────────────────────
    AssignRoleRequest:
      type: object
      properties:
        role_id: { type: string, format: uuid }
      required: [role_id]

    Notification:
      type: object
      properties:
        id: { type: string, format: uuid }
        type: { type: string }
        title: { type: string }
        body: { type: string, nullable: true }
        resource_type: { type: string, nullable: true }
        resource_id: { type: string, format: uuid, nullable: true }
        is_read: { type: boolean }
        created_at: { type: string, format: date-time }
      required: [id, type, title, is_read, created_at]

    # ── Location detection ─────────────────────────────────────────────────
    LocationDiff:
      type: object
      additionalProperties: true
      properties:
        asset_id: { type: string, format: uuid }
        recorded_rack_id: { type: string, format: uuid, nullable: true }
        detected_rack_id: { type: string, format: uuid, nullable: true }
        reason: { type: string }

    LocationDetectSummary:
      type: object
      properties:
        total_assets: { type: integer, format: int64 }
        tracked_by_network: { type: integer, format: int64 }
        relocations_24h: { type: integer, format: int64 }
        missing: { type: integer, format: int64 }
        unregistered: { type: integer, format: int64 }
        coverage_pct: { type: number, format: float }

    LocationAnomaly:
      type: object
      additionalProperties: true
      properties:
        type: { type: string }
        asset_id: { type: string, format: uuid, nullable: true }
        description: { type: string }
        severity: { type: string, enum: [low, medium, high, critical] }

    LocationDetectReport:
      type: object
      properties:
        period_days: { type: integer }
        total_assets: { type: integer, format: int64 }
        tracked_by_network: { type: integer, format: int64 }
        coverage_pct: { type: string }
        total_relocations: { type: integer, format: int64 }
        authorized_relocations: { type: integer, format: int64 }
        unauthorized_relocations: { type: integer, format: int64 }
        unregistered_devices: { type: integer, format: int64 }
        location_alerts: { type: integer, format: int64 }
        auto_corrections: { type: integer, format: int64 }

    # ── Capacity / fleet ───────────────────────────────────────────────────
    CapacityPlanning:
      type: object
      additionalProperties: true
      properties:
        total_racks: { type: integer }
        used_rack_units: { type: integer }
        total_rack_units: { type: integer }
        rack_utilization_pct: { type: number, format: float }
        power_capacity_kw: { type: number, format: float }
        power_consumption_kw: { type: number, format: float }
        power_utilization_pct: { type: number, format: float }
        projected_full_months: { type: integer, nullable: true }

    FleetMetrics:
      type: object
      additionalProperties: true
      properties:
        total_assets: { type: integer }
        avg_cpu_pct: { type: number, format: float }
        avg_memory_pct: { type: number, format: float }
        health_distribution:
          type: object
          additionalProperties:
            type: integer

    # ── Sync ───────────────────────────────────────────────────────────────
    SyncChangeSet:
      type: object
      properties:
        changes:
          type: array
          items:
            type: object
            additionalProperties: true
        has_more: { type: boolean }
        latest_version: { type: integer, format: int64 }
      required: [changes, has_more, latest_version]

    SyncStateRow:
      type: object
      properties:
        node_id: { type: string }
        entity_type: { type: string }
        last_sync_version: { type: integer, format: int64 }
        last_sync_at: { type: string, format: date-time, nullable: true }
        status: { type: string }
        error_message: { type: string, nullable: true }

    SyncConflict:
      type: object
      properties:
        id: { type: string, format: uuid }
        entity_type: { type: string }
        entity_id: { type: string, format: uuid }
        local_version: { type: integer, format: int64 }
        remote_version: { type: integer, format: int64 }
        local_diff: { type: object, additionalProperties: true, nullable: true }
        remote_diff: { type: object, additionalProperties: true, nullable: true }
        created_at: { type: string, format: date-time }

    SyncResolveRequest:
      type: object
      properties:
        resolution: { type: string, enum: [local_wins, remote_wins] }
      required: [resolution]

    SyncEntityStats:
      type: object
      properties:
        entity_type: { type: string }
        max_version: { type: integer, format: int64 }
        nodes:
          type: array
          items:
            type: object
            properties:
              node_id: { type: string }
              last_sync_version: { type: integer, format: int64 }
              gap: { type: integer, format: int64 }
            required: [node_id, last_sync_version, gap]
      required: [entity_type, max_version, nodes]
