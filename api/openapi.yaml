        type:
          type: string
        status:
          type: string
        priority:
          type: string
        location_id:
          type: string
          format: uuid
        assignee_id:
          type: string
          nullable: true
          format: uuid
        description:
          type: string
        scheduled_start:
          type: string
          format: date-time
        scheduled_end:
          type: string
          format: date-time
        actual_start:
          type: string
          nullable: true
          format: date-time
        actual_end:
          type: string
          nullable: true
          format: date-time
        created_at:
          type: string
          format: date-time
      required:
