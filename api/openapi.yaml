components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    # ── Response wrappers ─────────────────────────────────────────────────
    Meta:
      type: object
      properties:
        request_id:
          type: string
      required: [request_id]

    Pagination:
      type: object
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
      required: [page, page_size, total, total_pages]

    ErrorBody:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required: [code, message]

    ErrorResponse:
      type: object
      properties:
        error:
          $ref: '#/components/schemas/ErrorBody'
        meta:
          $ref: '#/components/schemas/Meta'
      required: [error, meta]

    # ── Auth ──────────────────────────────────────────────────────────────
    TokenPair:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
      required: [access_token, refresh_token, expires_in]

    CurrentUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        display_name:
          type: string
        email:
          type: string
        permissions:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
      required: [id, username, display_name, email, permissions]

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    RefreshRequest:
      type: object
      properties:
        refresh_token:
          type: string
      required: [refresh_token]

    # ── Asset ─────────────────────────────────────────────────────────────
    Asset:
      type: object
      properties:
        id:
          type: string
          format: uuid
        asset_tag:
          type: string
        property_number:
          type: string
          nullable: true
        control_number:
          type: string
          nullable: true
        name:
          type: string
        type:
          type: string
        sub_type:
          type: string
        status:
          type: string
        bia_level:
          type: string
        location_id:
          type: string
          nullable: true
          format: uuid
        rack_id:
          type: string
          nullable: true
          format: uuid
        vendor:
          type: string
        model:
          type: string
        serial_number:
          type: string
        attributes:
          type: object
          additionalProperties: true
        tags:
          type: array
          items:
            type: string
          default: []
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - asset_tag
        - name
        - type
        - sub_type
        - status
        - bia_level
        - vendor
        - model
        - serial_number
        - attributes
        - tags
        - created_at
        - updated_at

    # ── Location ──────────────────────────────────────────────────────────
    Location:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        name_en:
          type: string
        slug:
          type: string
        level:
          type: string
        parent_id:
          type: string
          nullable: true
          format: uuid
        path:
          type: string
        status:
          type: string
        metadata:
          type: object
          additionalProperties: true
        sort_order:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - name_en
        - slug
        - level
        - path
        - status
        - metadata
        - sort_order
        - created_at
        - updated_at

    # ── Rack ──────────────────────────────────────────────────────────────
    Rack:
      type: object
      properties:
        id:
          type: string
          format: uuid
        location_id:
          type: string
          format: uuid
        name:
          type: string
        row_label:
          type: string
        total_u:
          type: integer
        used_u:
          type: integer
        power_capacity_kw:
          type: number
        power_current_kw:
          type: number
        status:
          type: string
        tags:
          type: array
          items:
            type: string
          default: []
        created_at:
          type: string
          format: date-time
      required:
        - id
        - location_id
        - name
        - row_label
        - total_u
        - used_u
        - power_capacity_kw
        - power_current_kw
        - status
        - tags
        - created_at

    # ── WorkOrder ─────────────────────────────────────────────────────────
    WorkOrder:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        title:
          type: string
        type:
          type: string
        status:
          type: string
        priority:
          type: string
        location_id:
          type: string
          format: uuid
        assignee_id:
          type: string
          nullable: true
          format: uuid
        description:
          type: string
        scheduled_start:
          type: string
          format: date-time
        scheduled_end:
          type: string
          format: date-time
        actual_start:
          type: string
          nullable: true
          format: date-time
        actual_end:
          type: string
          nullable: true
          format: date-time
        created_at:
          type: string
          format: date-time
      required:
        - id
        - code
        - title
        - type
        - status
        - priority
        - location_id
        - description
        - scheduled_start
        - scheduled_end
        - created_at

    # ── MetricPoint ──────────────────────────────────────────────────────
    MetricPoint:
      type: object
      properties:
        time:
          type: string
          format: date-time
        name:
          type: string
        value:
          type: number
          format: double
      required: [time, name, value]

    # ── AlertEvent ────────────────────────────────────────────────────────
    AlertEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        rule_id:
          type: string
          format: uuid
        ci_id:
          type: string
          format: uuid
        status:
          type: string
        severity:
          type: string
        message:
          type: string
        trigger_value:
          type: number
        fired_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          nullable: true
          format: date-time
      required:
        - id
        - rule_id
        - ci_id
        - status
        - severity
        - message
        - trigger_value
        - fired_at

    # ── AlertRule ─────────────────────────────────────────────────────
    AlertRule:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        metric_name:
          type: string
        condition:
          type: object
          additionalProperties: true
        severity:
          type: string
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - metric_name
        - condition
        - severity
        - enabled
        - created_at

    # ── Incident ──────────────────────────────────────────────────────
    Incident:
      type: object
      properties:
        id:
