        type:
          type: string
        provider:
          type: string
        config:
          type: object
          additionalProperties: true
        enabled:
          type: boolean
      required:
        - id
        - name
        - type
        - provider
        - config
        - enabled

    # ── PredictionResult ──────────────────────────────────────────────────
    PredictionResult:
      type: object
      properties:
        id:
          type: string
          format: uuid
        model_id:
          type: string
          format: uuid
        ci_id:
          type: string
          format: uuid
        prediction_type:
          type: string
        result:
          type: object
          additionalProperties: true
        severity:
          type: string
        recommended_action:
          type: string
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
      required:
        - id
        - model_id
        - ci_id
        - prediction_type
        - result
        - severity
        - recommended_action
        - expires_at
        - created_at

