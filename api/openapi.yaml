openapi: "3.0.3"
info:
  title: CMDB Platform API
  version: "1.0.0"
  description: Configuration Management Database Platform API
servers:
  - url: /api/v1
security:
  - BearerAuth: []

tags:
  - name: auth
    description: Authentication
  - name: topology
    description: Locations, racks, and physical topology
  - name: assets
    description: Asset management
  - name: maintenance
    description: Work orders and maintenance
  - name: monitoring
    description: Alerts and monitoring
  - name: inventory
    description: Inventory tasks
  - name: audit
    description: Audit trail
  - name: dashboard
    description: Dashboard statistics
  - name: identity
    description: Users and roles
  - name: prediction
    description: AI predictions and RCA
  - name: system
    description: System health and diagnostics
  - name: integration
    description: Integration adapters and webhooks
  - name: bia
    description: Business Impact Analysis
  - name: quality
    description: Data Quality Governance
  - name: discovery
    description: Auto-Discovery staging area

paths:
  # ── Auth ────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      security: []
      summary: Authenticate and obtain tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/TokenPair'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      security: []
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/TokenPair'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current authenticated user
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CurrentUser'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Revoke the current access token and all refresh tokens
      description: |
        Adds the current access token's jti to the Redis blacklist and
        deletes every outstanding refresh token for the calling user. Use
        this when a user actively signs out so that a stolen bearer token
        cannot continue to authenticate until its natural expiry.
      responses:
        '204':
          description: Logged out
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change the authenticated user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password:
                  type: string
                new_password:
                  type: string
      responses:
        '200':
          description: Password changed
        '400':
          $ref: '#/components/responses/BadRequest'

  # ── Topology ────────────────────────────────────────────────────────────
  /locations:
    get:
      operationId: listLocations
      tags: [topology]
      summary: List locations
      parameters:
        - name: slug
          in: query
          schema:
            type: string
        - name: level
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Location list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Location'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createLocation
      tags: [topology]
      summary: Create a new location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug, level, status]
              properties:
                name:
                  type: string
                name_en:
                  type: string
                slug:
                  type: string
                level:
                  type: string
                parent_id:
                  type: string
                  format: uuid
                  nullable: true
                status:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
                sort_order:
                  type: integer
      responses:
        '201':
          description: Location created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Location'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /locations/{id}:
    get:
      operationId: getLocation
      tags: [topology]
      summary: Get a location by ID
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Location detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Location'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateLocation
      tags: [topology]
      summary: Update a location
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                name_en:
                  type: string
                slug:
                  type: string
                level:
                  type: string
                status:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
                sort_order:
                  type: integer
      responses:
        '200':
          description: Location updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Location'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteLocation
      tags: [topology]
      summary: Delete a location
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Location deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /locations/{id}/children:
    get:
      operationId: listLocationChildren
      tags: [topology]
      summary: List child locations
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Child locations
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Location'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /locations/{id}/ancestors:
    get:
      operationId: listLocationAncestors
      tags: [topology]
      summary: List ancestor locations
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Ancestor locations
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Location'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /locations/{id}/stats:
    get:
      operationId: getLocationStats
      tags: [topology]
      summary: Get location statistics
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Location stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/LocationStats'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /locations/{id}/descendants:
    get:
      operationId: listLocationDescendants
      tags: [topology]
      summary: List all descendant locations
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Descendant locations
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Location'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /locations/{id}/racks:
    get:
      operationId: listLocationRacks
      tags: [topology]
      summary: List racks in a location
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Rack list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Rack'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /racks:
    post:
      operationId: createRack
      tags: [topology]
      summary: Create a new rack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [location_id, name, status]
              properties:
                location_id:
                  type: string
                  format: uuid
                name:
                  type: string
                row_label:
                  type: string
                total_u:
                  type: integer
                power_capacity_kw:
                  type: number
                status:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Rack created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Rack'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /racks/{id}:
    get:
      operationId: getRack
      tags: [topology]
      summary: Get a rack by ID
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Rack detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Rack'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateRack
      tags: [topology]
      summary: Update a rack
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                row_label:
                  type: string
                total_u:
                  type: integer
                power_capacity_kw:
                  type: number
                status:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Rack updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Rack'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteRack
      tags: [topology]
      summary: Delete a rack
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Rack deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /racks/{id}/assets:
    get:
      operationId: listRackAssets
      tags: [topology]
      summary: List assets in a rack
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Asset list for rack
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Asset'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /racks/{id}/slots:
    get:
      operationId: listRackSlots
      tags: [topology]
      summary: List rack slot assignments
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Rack slots with asset info
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RackSlot'
                  meta:
                    $ref: '#/components/schemas/Meta'
    post:
      operationId: createRackSlot
      tags: [topology]
      summary: Assign asset to rack slot (with conflict detection)
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [asset_id, start_u, end_u]
              properties:
                asset_id:
                  type: string
                  format: uuid
                start_u:
                  type: integer
                end_u:
                  type: integer
                side:
                  type: string
                  default: front
      responses:
        '201':
          description: Slot created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/RackSlot'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '400':
          $ref: '#/components/responses/BadRequest'

  /racks/{id}/slots/{slotId}:
    delete:
      operationId: deleteRackSlot
      tags: [topology]
      summary: Remove asset from rack slot
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - name: slotId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Slot removed

  /racks/stats:
    get:
      operationId: getRackStats
      tags: [topology]
      summary: Get rack occupancy statistics
      responses:
        '200':
          description: Rack stats

  /racks/{id}/maintenance:
    get:
      operationId: getRackMaintenance
      tags: [maintenance]
      summary: Get maintenance history for a rack
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Rack maintenance records

  /racks/{id}/network-connections:
    get:
      operationId: listRackNetworkConnections
      tags: [topology]
      summary: List network connections in a rack
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Network connections
    post:
      operationId: createRackNetworkConnection
      tags: [topology]
      summary: Create a network connection
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '201':
          description: Connection created

  /racks/{id}/network-connections/{connectionId}:
    delete:
      operationId: deleteRackNetworkConnection
      tags: [topology]
      summary: Delete a network connection
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Connection deleted

  /topology/dependencies:
    get:
      operationId: listAssetDependencies
      tags: [topology]
      summary: List asset dependencies
      parameters:
        - name: asset_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Dependency list
    post:
      operationId: createAssetDependency
      tags: [topology]
      summary: Create asset dependency
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Dependency created

  /topology/dependencies/{id}:
    delete:
      operationId: deleteAssetDependency
      tags: [topology]
      summary: Delete asset dependency
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Dependency deleted

  /topology/graph:
    get:
      operationId: getTopologyGraph
      tags: [topology]
      summary: Get topology graph for a location
      parameters:
        - name: location_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Topology graph data

  # ── Assets ──────────────────────────────────────────────────────────────
  /assets:
    get:
      operationId: listAssets
      tags: [assets]
      summary: List assets with pagination and filters
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: type
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: location_id
          in: query
          schema:
            type: string
            format: uuid
        - name: rack_id
          in: query
          schema:
            type: string
            format: uuid
        - name: serial_number
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated asset list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Asset'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createAsset
      tags: [assets]
      summary: Create a new asset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Asset'
      responses:
        '201':
          description: Asset created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Asset'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /assets/{id}:
    get:
      operationId: getAsset
      tags: [assets]
      summary: Get an asset by ID
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Asset detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Asset'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateAsset
      tags: [assets]
      summary: Update an asset
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                status:
                  type: string
                bia_level:
                  type: string
                location_id:
                  type: string
                  format: uuid
                  nullable: true
                rack_id:
                  type: string
                  format: uuid
                  nullable: true
                vendor:
                  type: string
                model:
                  type: string
                serial_number:
                  type: string
                attributes:
                  type: object
                  additionalProperties: true
                tags:
                  type: array
                  items:
                    type: string
                bmc_ip:
                  type: string
                  nullable: true
                bmc_type:
                  type: string
                  nullable: true
                bmc_firmware:
                  type: string
                  nullable: true
                purchase_date:
                  type: string
                  nullable: true
                  description: ISO-8601 date (YYYY-MM-DD)
                purchase_cost:
                  type: number
                  format: double
                  nullable: true
                warranty_start:
                  type: string
                  nullable: true
                  description: ISO-8601 date (YYYY-MM-DD)
                warranty_end:
                  type: string
                  nullable: true
                  description: ISO-8601 date (YYYY-MM-DD)
                warranty_vendor:
                  type: string
                  nullable: true
                warranty_contract:
                  type: string
                  nullable: true
                eol_date:
                  type: string
                  nullable: true
                  description: ISO-8601 date (YYYY-MM-DD)
                expected_lifespan_months:
                  type: integer
                  nullable: true
                ip_address:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Asset updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Asset'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteAsset
      tags: [assets]
      summary: Delete an asset
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Asset deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /assets/lifecycle-stats:
    get:
      operationId: getAssetLifecycleStats
      tags: [assets]
      summary: Get asset counts by lifecycle status
      responses:
        '200':
          description: Lifecycle statistics

  /assets/{id}/upgrade-recommendations:
    get:
      operationId: getAssetUpgradeRecommendations
      tags: [assets]
      summary: Get upgrade recommendations for an asset
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Upgrade recommendations

  /assets/{id}/upgrade-recommendations/{category}/accept:
    post:
      operationId: acceptUpgradeRecommendation
      tags: [assets]
      summary: Accept an upgrade recommendation
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - name: category
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Recommendation accepted

  # ── Maintenance ─────────────────────────────────────────────────────────
  /maintenance/orders:
    get:
      operationId: listWorkOrders
      tags: [maintenance]
      summary: List work orders
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            type: string
        - name: asset_id
          in: query
          schema:
            type: string
            format: uuid
        - name: location_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated work order list
          content:
            application/json:
              schema:
