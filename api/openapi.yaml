        module:
          type: string
        target_type:
          type: string
        target_id:
          type: string
          format: uuid
        operator_id:
          type: string
          format: uuid
        diff:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
      required:
        - id
        - action
        - module
        - target_type
        - target_id
        - operator_id
        - diff
        - created_at

    # ── User ──────────────────────────────────────────────────────────────
    User:
      type: object
      properties:
