server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Ingestion (Python) traffic must be matched BEFORE the catch-all
    # /api/ rule, otherwise these requests would land on cmdb-core and
    # 404/403 — see audit finding H7 (2026-04-28). The trailing slash on
    # proxy_pass + the rewriting prefix together strip "/api/v1/ingestion"
    # so the upstream sees its own routes (e.g. "/credentials").
    location /api/v1/ingestion/ {
        rewrite ^/api/v1/ingestion/(.*)$ /$1 break;
        proxy_pass http://ingestion-engine:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 50m;
    }

    location /api/ {
        proxy_pass http://cmdb-core:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /ws {
        proxy_pass http://cmdb-core:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /readyz {
        proxy_pass http://cmdb-core:8080;
    }

    location /healthz {
        proxy_pass http://cmdb-core:8080;
    }

    location /metrics {
        proxy_pass http://cmdb-core:8080;
    }
}
