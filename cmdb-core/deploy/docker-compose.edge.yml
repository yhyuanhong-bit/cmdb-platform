# Edge deployment overlay
# Usage: docker compose -f docker-compose.yml -f docker-compose.edge.yml up -d
services:
  cmdb-core:
    environment:
      DEPLOY_MODE: edge
      TENANT_ID: ${TENANT_ID:?TENANT_ID is required for edge deployments}
      MCP_ENABLED: "false"
      WS_ENABLED: "false"
      OTEL_ENDPOINT: ""
    ports:
      - "8080:8080"
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1"
          memory: 256M

  ingestion-worker:
    deploy:
      replicas: 1

  nats:
    volumes:
      - ./nats/nats-edge.conf:/etc/nats/nats.conf:ro
      - nats_data:/data

  # Disable observability stack for edge
  otel-collector:
    deploy:
      replicas: 0

  jaeger:
    deploy:
      replicas: 0

  prometheus:
    deploy:
      replicas: 0

  loki:
    deploy:
      replicas: 0

  promtail:
    deploy:
      replicas: 0

  grafana:
    deploy:
      replicas: 0
