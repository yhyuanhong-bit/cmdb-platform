server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: containerlogs
          __path__: /var/log/containers/*.log
    pipeline_stages:
      - docker: {}
      - json:
          expressions:
            level: level
            module: module
            tenant_id: tenant_id
            request_id: request_id
      - labels:
          level:
          module:
          tenant_id:
          request_id:
