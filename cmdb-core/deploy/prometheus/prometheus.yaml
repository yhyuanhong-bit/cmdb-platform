global:
  scrape_interval: 15s

scrape_configs:
  - job_name: cmdb-core
    static_configs:
      - targets:
          - cmdb-core:8080
    metrics_path: /metrics

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8889

  - job_name: nats
    static_configs:
      - targets:
          - nats:8222
    metrics_path: /varz
