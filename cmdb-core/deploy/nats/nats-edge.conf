server_name: cmdb-edge

listen: 0.0.0.0:4222

jetstream {
    store_dir: /data/jetstream
    max_mem: 256M
    max_file: 10G
}

leafnodes {
    remotes [
        {
            url: nats-leaf://central-nats:7422

            # TLS configuration for production
            # tls {
            #     cert_file: /etc/nats/certs/client-cert.pem
            #     key_file: /etc/nats/certs/client-key.pem
            #     ca_file: /etc/nats/certs/ca.pem
            # }
        }
    ]
}

http: 0.0.0.0:8222

max_payload: 1MB
max_connections: 200
