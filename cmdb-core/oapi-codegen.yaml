package: api
output: internal/api/generated.go
generate:
  models: true
  gin-server: true
  embedded-spec: false
output-options:
  # These operations are documented in openapi.yaml but registered manually
  # in cmd/server/main.go (outside api.RegisterHandlers). They intentionally
  # do not implement the generated ServerInterface signature.
  exclude-operation-ids:
    - downloadImportTemplate
    - getAssetLifecycle
    - getAssetLocationHistory
    - getAssetQRData
    - confirmAssetLocation
    - getLocationAssetCounts
    - getItemScanHistory
    - createItemScanRecord
    - getRackQRData
    - getCapacityPlanning
    - getFleetMetricsSummary
    - syncGetChanges
    - syncGetState
    - syncGetConflicts
    - syncResolveConflict
    - syncSnapshot
    - syncStats
    - getMaintenanceOrderComments
    - createMaintenanceOrderComment
    - acceptUpgradeRecommendation
    - createItemNote
    - createRackNetworkConnection
    - createWorkOrderComment
    - deleteAssetDependency
    - deleteRackNetworkConnection
    - deleteSensor
    - getActivityFeed
    - getAssetRUL
    - getAssetUpgradeRecommendations
    - getAuditEventDetail
    - getEnergyBreakdown
    - getEnergyTrend
    - getInventoryDiscrepancies
    - getInventoryRacksSummary
    - getItemNotes
    - getRackMaintenance
    - getTopologyGraph
    - listSensors
    - resolveInventoryDiscrepancy
    - sensorHeartbeat
    - updateSensor
    - listAssetDependencies
    - listRackNetworkConnections
    - listUserSessions
    - listWorkOrderComments
