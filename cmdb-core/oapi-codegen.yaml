package: api
output: internal/api/generated.go
generate:
  models: true
  gin-server: true
  embedded-spec: false
output-options:
  # These operations are documented in openapi.yaml but registered manually
  # in cmd/server/main.go (outside api.RegisterHandlers). They intentionally
  # do not implement the generated ServerInterface signature.
  exclude-operation-ids:
    - getAssetLifecycle
    - getAssetLocationHistory
    - getAssetQRData
    - confirmAssetLocation
    - getLocationAssetCounts
    - getRackQRData
    - acceptUpgradeRecommendation
    - deleteAssetDependency
    - getActivityFeed
    - getAssetRUL
    - getAssetUpgradeRecommendations
    - getAuditEventDetail
    - getRackMaintenance
    - getTopologyGraph
    - listAssetDependencies
    - listUserSessions
